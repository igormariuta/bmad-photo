<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMAD Gallery</title>
    <!--
      Flash-of-wrong-theme prevention: must run inline, non-deferred, before first paint, so it
      can't import packages/ui's THEME_STORAGE_KEY. Keep the "theme" key and fallback logic here
      in sync by hand with packages/ui/src/ThemeToggle/ThemeToggle.tsx and the twin script in
      apps/landing/src/layouts/Layout.astro.
    -->
    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        var dark = stored ? stored === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.classList.toggle("dark", dark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app-shell/main.tsx"></script>
  </body>
</html>
